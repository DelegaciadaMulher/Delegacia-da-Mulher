<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BOs Pendentes - Delegacia da Mulher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles/admin-pending.css" />
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>

  <main class="page">
    <header class="hero">
      <div>
        <p class="tag">Delegacia da Mulher</p>
        <h1>BOs Pendentes</h1>
        <p class="subtitle">Lista de boletins aguardando vinculo de arquivos BO + Extrato.</p>
      </div>
      <div class="hero-actions">
        <a href="/admin/painel" class="ghost-btn">Voltar ao painel</a>
        <button id="refreshBtn" class="refresh-btn">Atualizar</button>
      </div>
    </header>

    <section class="panel">
      <div class="summary-row">
        <div>
          <strong>Total pendente:</strong>
          <span id="pendingCount">0</span>
        </div>
      </div>
      <div class="table-wrap">
        <table class="pending-table">
          <thead>
            <tr>
              <th>BO</th>
              <th>Flagrante</th>
              <th>Natureza</th>
              <th>Vitima</th>
              <th>Indiciado</th>
              <th>Local</th>
            </tr>
          </thead>
          <tbody id="pendingTableBody"></tbody>
        </table>
      </div>
      <div id="pendingList" class="list"></div>
    </section>
  </main>

  <script src="/scripts/admin-pending.js"></script>
</body>
</html>
