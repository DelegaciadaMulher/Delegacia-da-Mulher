<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro - Delegacia da Mulher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles/admin-register.css?v=20260417d" />
</head>
<body>
  <main class="auth-shell">
    <section class="card">
      <h1>Cadastro de novo usuário</h1>
      <p>Preencha seus dados para solicitar acesso. O administrador aprovador irá liberar seu cadastro.</p>

      <form id="registerForm" class="form">
        <label for="fullName">Nome completo</label>
        <input id="fullName" placeholder="Seu nome" required />

        <label for="cpf">CPF</label>
        <input id="cpf" maxlength="14" placeholder="000.000.000-00" required />

        <label for="email">Email</label>
        <input id="email" type="email" placeholder="seu@email.com" required />

        <label for="phone">Telefone</label>
        <input id="phone" placeholder="(00) 90000-0000" required />

        <label for="role">Perfil</label>
        <select id="role" required>
          <option value="agent">Agente</option>
          <option value="plantonista">Plantonista</option>
        </select>

        <p class="status">Escolha o perfil desejado. Todo novo cadastro depende de aprovacao do administrador.</p>

        <button type="submit">Enviar solicitação</button>
      </form>

      <div class="auth-actions">
        <a href="/admin" class="secondary-btn">Voltar ao login</a>
      </div>

      <p id="status" class="status"></p>
    </section>
  </main>

  <script src="/scripts/admin-register.js?v=20260417d"></script>
</body>
</html>
