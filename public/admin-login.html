<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Admin - Delegacia da Mulher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles/admin-login.css" />
</head>
<body>
  <main class="auth-shell">
    <section class="card">
      <h1>Área Administrativa</h1>
      <p>Entre com CPF e receba o código no WhatsApp cadastrado.</p>

      <form id="requestOtpForm" class="form">
        <label for="cpf">CPF</label>
        <input id="cpf" maxlength="14" placeholder="000.000.000-00" required />
        <button type="submit">Enviar codigo</button>
      </form>

      <form id="verifyOtpForm" class="form hidden">
        <label for="code">Codigo</label>
        <input id="code" maxlength="6" placeholder="000000" required />
        <button type="submit">Entrar no painel</button>
      </form>

      <p id="status" class="status"></p>
    </section>
  </main>

  <script src="/scripts/admin-login.js"></script>
</body>
</html>
